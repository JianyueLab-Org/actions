name: Deploy Dokploy

on:
  workflow_call:
    inputs:
      environment_url:
        description: "The URL of the deployed environment (e.g. https://myapp.example.com)"
        required: true
        type: string
      sha:
        description: "Commit SHA to deploy (defaults to the triggering commit)"
        required: false
        type: string
        default: ""
    secrets:
      DOKPLOY_API_KEY:
        required: true
      APPLICATION_ID:
        required: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        env:
          INPUT_SHA: ${{ inputs.sha }}
        with:
          result-encoding: string
          script: |
            const sha = process.env.INPUT_SHA || context.sha;
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              environment: "production",
              required_contexts: [],
            });
            return String(deployment.data.id);

      - name: Trigger Dokploy Deployment
        id: dokploy
        run: |
          curl -X "POST" \
            "https://app.jianyuelab.org/api/application.deploy" \
            -H "accept: application/json" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{ "applicationId": "${{ secrets.APPLICATION_ID }}" }'

      - name: Update Deployment Status
        if: success()
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.result }}
          ENVIRONMENT_URL: ${{ inputs.environment_url }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: "success",
              environment_url: process.env.ENVIRONMENT_URL,
            });

      - name: Update Deployment Status (Failed)
        if: failure()
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.result }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: "failure",
            });
